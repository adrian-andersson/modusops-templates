# Release (tag) for a modusOps templates-library repo hosted on Azure DevOps.
#
# On merge to main: compute the next ROLLING-INTEGER tag (v1, v2, v3, …) and push it. THE TAG IS THE
# WHOLE JOB - unlike the gh release.yml there are no downloadable assets on Azure DevOps. The tag is the
# distribution pin: azd consumers reference templates via a `repository:` resource at refs/tags/vN (or
# vendor a tagged copy with the modusOps tooling). Single-integer (N+), not SemVer: the library is a
# curated SET, so one monotonic coordinate is the compatibility pin.
#
# The Build Service identity needs 'Contribute' + 'Create tag' on the repo (Project Settings >
# Repositories > Security). `persistCredentials: true` wires the build token into git so the push works.
trigger:
  batch: true        # serialise runs so two merges can't race for the same vN
  branches:
    include:
      - main

pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self
    persistCredentials: true
    fetchDepth: 0      # need the full tag history to compute the next vN

  - task: PowerShell@2
    displayName: 'Tag next rolling-integer version'
    inputs:
      targetType: 'inline'
      pwsh: true
      script: |
        $VerbosePreference = 'Continue'
        $ErrorActionPreference = 'Stop'

        # Single-integer (N+): highest existing vN + 1; first tag is v1. Old SemVer tags (vX.Y.Z) are
        # ignored by the `^v(\d+)$` match, so the N+ sequence starts cleanly at v1.
        git fetch --tags --quiet
        $existing = @(git tag --list 'v*') | Where-Object { $_ -match '^v(\d+)$' } | ForEach-Object { [int]$Matches[1] }
        if($existing){
            $next = (($existing | Measure-Object -Maximum).Maximum) + 1
        }else{
            Write-Verbose 'No existing vN tags; first tag is v1'
            $next = 1
        }
        $nextTag = "v$next"
        Write-Verbose "Existing single-int tags: $($existing -join ', '); next: $nextTag"

        # Tag the merge commit and push. persistCredentials configured git auth with the build token.
        git config user.email 'build@modusops'
        git config user.name  'modusOps Release'
        git tag $nextTag
        git push origin $nextTag

        Write-Host "Tagged $nextTag"
