name: 'Get SharePoint file'
description: >-
  Downloads a file from a SharePoint document library via Microsoft Graph. EXPECTS AN EXISTING GRAPH
  CONNECTION: run the connectMicrosoftGraph action earlier in the SAME job (the connection persists
  across steps within a job). No credential inputs. Microsoft.Graph.Authentication must be installed
  (installModusOpsModules).
inputs:
  sharePointSite:
    description: 'Site name to search for (Get-MgSite -Search).'
    required: true
  sharePointFile:
    description: "Drive-relative path, e.g. 'Reports/workbook.xlsx'."
    required: true
  localFile:
    description: 'Local destination path.'
    required: true
runs:
  using: composite
  steps:
    - name: Get SharePoint file
      shell: pwsh
      env:
        SP_SITE: ${{ inputs.sharePointSite }}
        SP_FILE: ${{ inputs.sharePointFile }}
        SP_LOCAL: ${{ inputs.localFile }}
      run: |
        $VerbosePreference = 'Continue'
        $ErrorActionPreference = 'Stop'

        $siteSearch = $env:SP_SITE
        $filePath   = $env:SP_FILE
        $localFile  = $env:SP_LOCAL

        if([string]::IsNullOrWhiteSpace($siteSearch)){ throw 'sharePointSite input is required.' }
        if([string]::IsNullOrWhiteSpace($filePath)){ throw 'sharePointFile input is required.' }
        if([string]::IsNullOrWhiteSpace($localFile)){ throw 'localFile input is required.' }

        if(-not (Get-MgContext -ErrorAction SilentlyContinue)){
            throw 'No active Microsoft Graph connection. Run the connectMicrosoftGraph action earlier in this job.'
        }

        Write-Verbose "Resolving SharePoint site '$siteSearch'"
        $site = Get-MgSite -Search $siteSearch | Select-Object -First 1
        if(-not $site){ throw "SharePoint site '$siteSearch' not found." }

        $drive = Get-MgSiteDrive -SiteId $site.Id | Select-Object -First 1
        if(-not $drive){ throw "No drive found on site '$siteSearch'." }

        $destDir = Split-Path -Parent $localFile
        if($destDir -and -not (Test-Path $destDir)){ New-Item -ItemType Directory -Path $destDir -Force | Out-Null }

        Write-Verbose "Downloading '$filePath' from drive $($drive.Id) to '$localFile'"
        Invoke-MgGraphRequest -Method GET `
            -Uri "https://graph.microsoft.com/v1.0/drives/$($drive.Id)/root:/$($filePath):/content" `
            -OutputFilePath $localFile

        Write-Verbose "File downloaded to $localFile"
