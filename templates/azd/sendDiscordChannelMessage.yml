parameters:
  - name: webhookUri
    type: string
  - name: type
    type: string
    default: 'Note'
  - name: title
    type: string
  - name: message
    type: string

steps:
  - task: PowerShell@2
    displayName: 'Send Discord channel message'
    inputs:
      targetType: 'inline'
      pwsh: true
      script: |
        $ErrorActionPreference = 'Stop'
        $webhookUri = "${{ parameters.webhookUri }}"
        $messageType = "${{ parameters.type }}"
        $title = "${{ parameters.title }}"
        $message = "${{ parameters.message }}"

        if ([string]::IsNullOrWhiteSpace($webhookUri)) {
            throw 'webhookUri parameter is required.'
        }

        # Discord embed colours are decimal integers
        $color = switch ($messageType.ToLower()) {
            'success' { 65280 }      # 00FF00
            'failure' { 16711680 }   # FF0000
            'warning' { 16776960 }   # FFFF00
            default { 30935 }        # 0078D7
        }

        $payload = @{
            embeds = @(
                @{
                    title = $title
                    description = $message
                    color = $color
                }
            )
        }

        $body = $payload | ConvertTo-Json -Depth 10
        Invoke-RestMethod -Uri $webhookUri -Method Post -ContentType 'application/json' -Body $body
