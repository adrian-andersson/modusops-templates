# PR validation for modusops-templates.
# Lints every distributed template for:
#   STRUCTURE (gates merge) - must parse as YAML, no tab indentation
#   PARAMETERS (gates merge) - default not in values, undeclared parameters.X reference,
#                              missing parameter name, duplicate parameter names
#   PARAM HINTS (advisory)   - declared-but-unused parameter, parameter missing explicit type
#   SPACING (advisory)       - trailing whitespace
# Posts a ModuleForge-style summary comment to the PR and FAILS on gating issues so a required
# status check blocks the merge. Only templates/ is linted - the workflow YAML is not a template.
name: PR validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  yaml-structure-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          Install-Module -Name 'powershell-yaml' -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module powershell-yaml
          Get-Module powershell-yaml | Select-Object Name, Version | Format-Table

      - name: Run YAML structure, parameter & spacing review
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          $VerbosePreference = 'Continue'
          Import-Module powershell-yaml

          $yamlFiles = @(Get-ChildItem -Path './templates' -Recurse -Include '*.yml','*.yaml' -ErrorAction SilentlyContinue)
          $fileCount = $yamlFiles.Count
          Write-Verbose "Found $fileCount YAML files"

          $flagged = [System.Collections.Generic.List[object]]::new()
          foreach($file in $yamlFiles){
              $raw = Get-Content -LiteralPath $file.FullName -Raw
              $lines = @(Get-Content -LiteralPath $file.FullName)

              $structure  = [System.Collections.Generic.List[string]]::new()  # gates
              $paramError = [System.Collections.Generic.List[string]]::new()  # gates
              $paramWarn  = [System.Collections.Generic.List[string]]::new()  # advisory
              $spacing    = [System.Collections.Generic.List[string]]::new()  # advisory

              # --- STRUCTURE: must parse as YAML ---
              $doc = $null
              try{ $doc = ConvertFrom-Yaml $raw }catch{ $structure.Add("Does not parse: $($_.Exception.Message)") }

              # --- STRUCTURE / SPACING: tabs in indentation, trailing whitespace ---
              for($i = 0; $i -lt $lines.Count; $i++){
                  if($lines[$i] -match '^\s*\t'){ $structure.Add("Tab indentation on line $($i+1)") }
                  if($lines[$i] -match ' +$'){ $spacing.Add("Trailing whitespace on line $($i+1)") }
              }

              # --- PARAMETERS: only for AZD-style templates (top-level `parameters:` list) ---
              if($doc -is [System.Collections.IDictionary] -and $doc.Contains('parameters') -and $doc['parameters']){
                  $params = @($doc['parameters'])

                  # Declared names (with name-presence + duplicate checks)
                  $declared = [System.Collections.Generic.List[string]]::new()
                  foreach($p in $params){
                      if(-not ($p -is [System.Collections.IDictionary]) -or -not $p.Contains('name') -or [string]::IsNullOrWhiteSpace($p['name'])){
                          $paramError.Add('A parameter entry is missing a name')
                          continue
                      }
                      $declared.Add([string]$p['name'])

                      # Missing explicit type (AZD silently treats as string)
                      if(-not $p.Contains('type')){ $paramWarn.Add("Parameter '$($p['name'])' has no explicit type") }

                      # default must be one of values (when both present)
                      if($p.Contains('values') -and $p.Contains('default')){
                          $vals = @($p['values'])
                          if($vals -notcontains $p['default']){
                              $paramError.Add("Parameter '$($p['name'])' default '$($p['default'])' is not one of values: $($vals -join ', ')")
                          }
                      }
                  }

                  # Duplicate names
                  foreach($g in ($declared | Group-Object | Where-Object Count -gt 1)){
                      $paramError.Add("Duplicate parameter name '$($g.Name)' ($($g.Count)x)")
                  }

                  # Referenced names: parameters.X  and  parameters['X'] / parameters["X"]
                  $refDot = [regex]::Matches($raw, 'parameters\.([A-Za-z_][A-Za-z0-9_]*)') | ForEach-Object { $_.Groups[1].Value }
                  $refIdx = [regex]::Matches($raw, 'parameters\[[''"]([A-Za-z_][A-Za-z0-9_]*)[''"]\]') | ForEach-Object { $_.Groups[1].Value }
                  $referenced = @($refDot + $refIdx) | Select-Object -Unique

                  # Declared but never referenced (advisory)
                  foreach($d in $declared){
                      if($referenced -notcontains $d){ $paramWarn.Add("Parameter '$d' is declared but never referenced") }
                  }
                  # Referenced but never declared (gates - typo / dead reference)
                  foreach($r in $referenced){
                      if($declared -notcontains $r){ $paramError.Add("Reference 'parameters.$r' has no matching declaration") }
                  }
              }

              if($structure.Count -or $paramError.Count -or $paramWarn.Count -or $spacing.Count){
                  $flagged.Add([PSCustomObject]@{
                      FileName   = $file.Name
                      Structure  = $structure.Count
                      ParamError = $paramError.Count
                      ParamWarn  = $paramWarn.Count
                      Spacing    = $spacing.Count
                      Counter    = "Struct:$($structure.Count) ParamErr:$($paramError.Count) ParamWarn:$($paramWarn.Count) Space:$($spacing.Count)"
                      Weight     = [int](($structure.Count * 50) + ($paramError.Count * 50) + ($paramWarn.Count * 10) + ($spacing.Count * 5))
                      Detail     = (@($structure) + @($paramError) + @($paramWarn) + @($spacing)) -join '; '
                  })
              }
          }

          $structureTotal  = [int](($flagged | Measure-Object -Property Structure  -Sum).Sum)
          $paramErrorTotal = [int](($flagged | Measure-Object -Property ParamError -Sum).Sum)
          $paramWarnTotal  = [int](($flagged | Measure-Object -Property ParamWarn  -Sum).Sum)
          $spacingTotal    = [int](($flagged | Measure-Object -Property Spacing    -Sum).Sum)
          $gateTotal = $structureTotal + $paramErrorTotal
          Write-Verbose "Structure:$structureTotal ParamErr:$paramErrorTotal ParamWarn:$paramWarnTotal Spacing:$spacingTotal"

          $flaggedSelect = if($flagged){ $flagged | Sort-Object -Property Weight -Descending | Select-Object -First 10 }else{ $null }
          $flaggedMarkdown = if($flaggedSelect){@(
              '### Flagged files'
              ''
              '| Filename | Counters | Detail |'
              '| --- | --- | --- |'
              $($flaggedSelect.ForEach{ "| $($_.FileName) | $($_.Counter) | $($_.Detail) |" })
              ''
          ) -join "`n"}else{ $null }

          $headline = if($gateTotal -gt 0){ '_Structure / parameter errors block this PR. Param hints and spacing are advisory._' }else{ '_No blocking issues. Any items below are advisory._' }

          $report = @(
              '### YAML Structure, Parameter & Spacing Review'
              ''
              $headline
              ''
              "- **YAML files checked:** $fileCount"
              "- **Structure issues:** $structureTotal $(if($structureTotal -gt 0){'❌'}else{'✅'})"
              "- **Parameter errors:** $paramErrorTotal $(if($paramErrorTotal -gt 0){'❌'}else{'✅'})"
              "- **Parameter hints:** $paramWarnTotal $(if($paramWarnTotal -gt 0){'⚠️'}else{'✅'})"
              "- **Spacing issues:** $spacingTotal $(if($spacingTotal -gt 0){'⚠️'}else{'✅'})"
              ''
              "$flaggedMarkdown"
              '_Notes:_'
              ''
              '- _Up to 10 flagged files shown, weighted (Structure/ParamErr:50 ParamWarn:10 Spacing:5)._'
              '- _Structure = must parse as YAML and must not use tab indentation._'
              '- _Parameter errors = default not in values, undeclared `parameters.X` reference, missing/duplicate name._'
              '- _Parameter hints = declared-but-unused parameter, or parameter missing an explicit type._'
              '- _Spacing = trailing whitespace. See the workflow log for exact lines._'
              ''
              '_Generated automatically by PR validation._'
          ) -join "`n"

          $report | Out-File -FilePath report.md -Encoding utf8
          if($env:PR_NUMBER){
              gh pr comment $env:PR_NUMBER --body-file report.md --repo $env:GITHUB_REPOSITORY
          }

          # Gate: structure + parameter errors fail the job so a required status check blocks the merge
          if($gateTotal -gt 0){
              throw "YAML validation failed: $structureTotal structure + $paramErrorTotal parameter error(s)."
          }
