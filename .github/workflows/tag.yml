# Cuts the next single-integer tag (v1, v2, v3, ...) so GH consumers can pin composite actions by an
# immutable ref: `uses: owner/modusops-templates/templates/gh/<name>@vN`.
#
# This is the GH-native pin style (cf. actions/checkout@v4) and is SEPARATE from the SemVer release tags
# (vX.Y.Z) cut by release.yml: SemVer is the library *version coordinate* recorded in the consumer
# lockfile for the vendor-at-fetch (azd) flow; vN is the *ref pin* for consumers who reference a gh
# composite action cross-repo instead of vendoring it. A vN tag is immutable - each cut is a new integer.
#
# PoC: manual (workflow_dispatch) for controlled tagging. The production shape can also trigger on
# `push: branches: [main]` to auto-cut every merge (commented below).
name: Tag

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: write

concurrency:
  group: tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need full tag history to compute the next integer

      - name: Cut next single-int tag
        shell: pwsh
        run: |
          $VerbosePreference = 'Continue'
          $ErrorActionPreference = 'Stop'

          # Highest existing vN, + 1 (first run -> v1). Tags are immutable: each cut is a new integer.
          $existing = @(git tag --list 'v*') | Where-Object { $_ -match '^v(\d+)$' } | ForEach-Object { [int]$Matches[1] }
          $next = if($existing){ ($existing | Measure-Object -Maximum).Maximum + 1 } else { 1 }
          $tag = "v$next"
          Write-Verbose "Existing single-int tags: $($existing -join ', ')"
          Write-Verbose "Next tag: $tag (at $env:GITHUB_SHA)"

          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag $tag
          git push origin $tag

          Write-Output "Cut tag $tag"
          "### Cut tag ``$tag``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
