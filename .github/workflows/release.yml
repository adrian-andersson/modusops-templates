# Release for modusops-templates.
# On merge to main: compute the next SemVer tag, attach the FULL template set as release assets, write
# a checksums.txt, plus manifest.json, and write release notes that list ONLY the templates that
# actually changed since the previous tag.
# Patch auto-bumps on every merge; minor/major via a manual run (workflow_dispatch).
#
# Asset shape (per platform):
#   azd  -> single file, asset name `azd.{name}.yml`        (integrity = file SHA256)
#   gh   -> composite-action DIRECTORY zipped, `gh.{name}.zip` (integrity = CANONICAL TREE HASH, below)
# The lockfile/Test-MOTemplate drift anchor for gh is the tree hash, NOT the zip's own SHA, because zip
# archives are not byte-reproducible. checksums.txt records the anchor value per asset (file SHA256 for
# .yml, tree hash for .zip) and is the reference implementation of the hashing the consumer tooling
# replicates at Add/Test time.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment'
        type: choice
        default: patch
        options: [patch, minor, major]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next SemVer tag
        id: ver
        shell: pwsh
        env:
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
        run: |
          $VerbosePreference = 'Continue'
          $tags = @(git tag --list)
          $versions = $tags | Where-Object { $_ -match '^v?\d+\.\d+\.\d+$' } | ForEach-Object { [version]($_.TrimStart('v')) }

          if($versions){
              $latest = $versions | Sort-Object -Descending | Select-Object -First 1
              Write-Verbose "Latest tag: v$latest"
              $type = if([string]::IsNullOrWhiteSpace($env:VERSION_TYPE)){ 'patch' }else{ $env:VERSION_TYPE }
              switch($type){
                  'major' { $next = [version]::new($latest.Major + 1, 0, 0) }
                  'minor' { $next = [version]::new($latest.Major, $latest.Minor + 1, 0) }
                  default { $next = [version]::new($latest.Major, $latest.Minor, $latest.Build + 1) }
              }
              $previous = "v$latest"
          }else{
              Write-Verbose 'No existing version tags; first release is v0.1.0'
              $next = [version]'0.1.0'
              $previous = ''
          }

          $nextTag = "v$($next.Major).$($next.Minor).$($next.Build)"
          Write-Verbose "Next tag: $nextTag (previous: '$previous')"
          "tag=$nextTag"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "previous=$previous"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage release assets (full set, platform-prefixed)
        shell: pwsh
        run: |
          $VerbosePreference = 'Continue'
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          # Canonical tree hash: sorted relative POSIX paths + per-file SHA256, themselves SHA256'd.
          # This is the gh integrity anchor the consumer lockfile pins (NOT the zip's own SHA).
          function Get-TreeHash {
              param([string]$Root)
              $files = Get-ChildItem -LiteralPath $Root -Recurse -File | Sort-Object {
                  ([IO.Path]::GetRelativePath($Root, $_.FullName) -replace '\\','/')
              }
              $sb = [System.Text.StringBuilder]::new()
              foreach($f in $files){
                  $rel = ([IO.Path]::GetRelativePath($Root, $f.FullName) -replace '\\','/')
                  $h = (Get-FileHash -LiteralPath $f.FullName -Algorithm SHA256).Hash.ToLower()
                  [void]$sb.Append("$rel`n$h`n")
              }
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($sb.ToString())
              $sha = [System.Security.Cryptography.SHA256]::Create()
              return ([System.BitConverter]::ToString($sha.ComputeHash($bytes)) -replace '-','').ToLower()
          }

          $checksums = [System.Collections.Generic.List[string]]::new()

          # --- azd: single-file templates -> azd.{name}.yml (anchor = file SHA256) ---
          $azd = @(Get-ChildItem -Path './templates/azd' -File -Include '*.yml','*.yaml' -Recurse -ErrorAction SilentlyContinue)
          foreach($t in $azd){
              $asset = "azd.$($t.Name)"
              Copy-Item -LiteralPath $t.FullName -Destination (Join-Path 'dist' $asset)
              $hash = (Get-FileHash -LiteralPath $t.FullName -Algorithm SHA256).Hash.ToLower()
              $checksums.Add("$hash  $asset")
          }

          # --- gh: composite-action directories -> gh.{name}.zip (anchor = canonical TREE hash) ---
          $ghDirs = @(Get-ChildItem -Path './templates/gh' -Directory -ErrorAction SilentlyContinue)
          foreach($d in $ghDirs){
              if(-not (Test-Path (Join-Path $d.FullName 'action.yml'))){
                  throw "gh template '$($d.Name)' has no action.yml - a composite action requires one."
              }
              $asset = "gh.$($d.Name).zip"
              $zipPath = Join-Path 'dist' $asset
              # Zip the directory CONTENTS so it expands straight into the vendored <name>/ folder.
              Compress-Archive -Path (Join-Path $d.FullName '*') -DestinationPath $zipPath -Force
              $tree = Get-TreeHash -Root $d.FullName
              $checksums.Add("$tree  $asset")
          }

          if($azd.Count -eq 0 -and $ghDirs.Count -eq 0){ throw 'No templates found under templates/.' }

          ($checksums | Sort-Object) -join "`n" | Out-File -FilePath 'dist/checksums.txt' -Encoding utf8 -NoNewline
          if(Test-Path './manifest.json'){ Copy-Item -LiteralPath './manifest.json' -Destination 'dist/manifest.json' }
          Get-ChildItem ./dist | Select-Object Name, Length | Format-Table
          Write-Verbose "checksums.txt:`n$(Get-Content dist/checksums.txt -Raw)"

      - name: Build changed-only release notes
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
          PREV_TAG: ${{ steps.ver.outputs.previous }}
        run: |
          $VerbosePreference = 'Continue'
          $changed = [System.Collections.Generic.List[string]]::new()
          if([string]::IsNullOrWhiteSpace($env:PREV_TAG)){
              $changed.Add('_Initial release — all templates._')
          }else{
              $diff = @(git diff --name-only "$($env:PREV_TAG)..HEAD" -- templates)
              if($diff.Count -eq 0){
                  $changed.Add('_No template changes (CI/metadata only)._')
              }else{
                  foreach($f in $diff){ $changed.Add("- ``$f``") }
              }
          }
          $notes = @(
              "## modusops-templates $($env:RELEASE_TAG)"
              ''
              '### Changed templates'
              ''
              ($changed -join "`n")
              ''
              '_The full template set is attached as release assets. Vendor with the modusOps tooling; pin the version + SHA256 in `.modusops.lock`._'
          ) -join "`n"
          $notes | Out-File -FilePath notes.md -Encoding utf8
          Write-Verbose "Notes:`n$notes"

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
        run: |
          $assets = @((Get-ChildItem ./dist).FullName)
          gh release create $env:RELEASE_TAG $assets --target $env:GITHUB_SHA --title $env:RELEASE_TAG --notes-file notes.md
